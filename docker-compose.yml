version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: amazori-postgres
    restart: always
    environment:
      POSTGRES_USER: amazori_user
      POSTGRES_PASSWORD: amazori_password
      POSTGRES_DB: amazori_db
    ports:
      - ":5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: